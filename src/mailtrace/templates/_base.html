<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}mailtrace{% endblock %}</title>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
        h1 { margin-bottom: 0.25rem; }
        .lede { color: #666; margin-top: 0; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
        label { display: block; margin: 0.6rem 0 0.2rem; font-weight: 600; font-size: 0.9rem; }
        input[type=text], input[type=number], textarea {
            width: 100%; padding: 0.45rem; border: 1px solid #ccc; border-radius: 4px;
            font-size: 0.95rem; box-sizing: border-box;
        }
        button, input[type=submit] {
            padding: 0.5rem 1rem; border: 0; background: #1f6feb; color: white;
            border-radius: 4px; cursor: pointer; font-size: 0.95rem;
        }
        button.secondary { background: #555; }
        .row { display: flex; gap: 0.5rem; }
        .row > * { flex: 1; }
        a { color: #1f6feb; }
        small { color: #666; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 0.4rem 0.5rem; text-align: left; font-size: 0.85rem; }
        th { background: #f5f5f5; }
        .err { color: #b00; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
