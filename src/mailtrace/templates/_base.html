<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>{% block title %}mailtrace{% endblock %}</title>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               max-width: 880px; margin: 0 auto; padding: 0 1rem 2rem; color: #222; }
        nav { display: flex; gap: 1rem; align-items: center; padding: 0.75rem 0;
              border-bottom: 1px solid #eee; margin-bottom: 1.5rem; flex-wrap: wrap; }
        nav .brand { font-weight: 700; }
        nav a { color: #1f6feb; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .spacer { flex: 1; }
        nav form { margin: 0; }
        nav button.linklike { background: none; border: 0; color: #1f6feb; cursor: pointer; padding: 0; font: inherit; }
        h1 { margin-bottom: 0.25rem; }
        .lede { color: #666; margin-top: 0; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
        label { display: block; margin: 0.6rem 0 0.2rem; font-weight: 600; font-size: 0.9rem; }
        input[type=text], input[type=email], input[type=password], input[type=number], textarea, select {
            width: 100%; padding: 0.45rem; border: 1px solid #ccc; border-radius: 4px;
            font-size: 0.95rem; box-sizing: border-box;
        }
        button, input[type=submit], a.btn {
            display: inline-block;
            padding: 0.5rem 1rem; border: 0; background: #1f6feb; color: white;
            border-radius: 4px; cursor: pointer; font-size: 0.95rem;
            text-decoration: none; line-height: normal;
        }
        a.btn:hover { text-decoration: none; opacity: 0.9; }
        button.secondary, a.btn.secondary { background: #555; }
        button.danger, a.btn.danger { background: #b00; }
        /* Action bars: wrap the buttons in a row so they line up nicely
           on narrow viewports without the dot-separator awkwardness. */
        .action-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
        .row { display: flex; gap: 0.5rem; }
        .row > * { flex: 1; }
        a { color: #1f6feb; }
        small { color: #666; }
        /* Tables. The card itself scrolls horizontally if a row genuinely
           can't fit (preferred over ugly mid-word wrapping). Wrap-anywhere
           is OPT-IN per cell-content type — applied only to <code>, .err,
           and explicit .wrap-anywhere — because applying it to every td
           shreds short labels like "test-leo-0" mid-word and stacks dates
           like "2026-05-06 03:17" onto two lines.

           Whitespace-nowrap on .pill / time / .nowrap keeps short atomic
           tokens (status pills, timestamps) on one line even when a
           sibling cell has long content forcing the row taller. */
        .card { overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; table-layout: auto; }
        th, td {
            border: 1px solid #ddd; padding: 0.4rem 0.5rem; text-align: left;
            font-size: 0.9rem; vertical-align: top;
        }
        th { background: #f5f5f5; }
        td .wrap-anywhere, td code, td .err {
            overflow-wrap: anywhere; word-break: break-word;
        }
        td time, td .pill, td .nowrap { white-space: nowrap; }
        .err { color: #b00; }
        .ok { color: #197b30; }
        .pill { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; background: #eee; font-size: 0.8rem; white-space: nowrap; }
        .pill.admin { background: #ffe4b5; }
        .pill.inactive { background: #f5b7b1; }
        .flash { padding: 0.75rem; border-radius: 6px; background: #fff5d6; border: 1px solid #f0c36d; margin: 1rem 0; }
        code { background: #f5f5f5; padding: 0.1rem 0.3rem; border-radius: 3px; overflow-wrap: anywhere; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
{% if user is defined and user %}
<nav>
    <span class="brand">mailtrace</span>
    <a href="/">Home</a>
    <a href="/pieces/">Pieces</a>
    <a href="/addresses/">Addresses</a>
    {% if user.is_admin %}<a href="/admin/">Admin</a>{% endif %}
    <span class="spacer"></span>
    <small>{{ user.email }}</small>
    <a href="/auth/account">Account</a>
    <form method="POST" action="/auth/logout"><button class="linklike" type="submit">Log out</button></form>
</nav>
{% endif %}
{% block body %}{% endblock %}
<script>
// Convert any <time data-utc="ISO-8601 in UTC">…</time> in the page to
// the user's browser-local timezone. Server templates emit the UTC
// timestamp as a stable fallback (text content) plus the data-utc
// attribute for in-browser conversion. Format hint via data-fmt:
//   "datetime"    (default) → "YYYY-MM-DD HH:mm" local
//   "date"                  → "YYYY-MM-DD" local
//   "datetime-tz"           → "YYYY-MM-DD HH:mm Z" local (Z = short TZ name)
//   "long"                  → toLocaleString() with the browser's defaults
function _pad(n) { return String(n).padStart(2, "0"); }
function _shortTzName(d) {
    try {
        const parts = new Intl.DateTimeFormat(undefined, { timeZoneName: "short" }).formatToParts(d);
        const tz = parts.find(function (p) { return p.type === "timeZoneName"; });
        return tz ? tz.value : "";
    } catch (_) { return ""; }
}
function _localFormat(d, fmt) {
    if (fmt === "long") return d.toLocaleString();
    const ymd = `${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
    if (fmt === "date") return ymd;
    const hm = `${_pad(d.getHours())}:${_pad(d.getMinutes())}`;
    if (fmt === "datetime-tz") {
        const tz = _shortTzName(d);
        return tz ? `${ymd} ${hm} ${tz}` : `${ymd} ${hm}`;
    }
    return `${ymd} ${hm}`;
}
document.querySelectorAll("time[data-utc]").forEach(function (el) {
    const iso = el.getAttribute("data-utc");
    const d = new Date(iso);
    if (isNaN(d.getTime())) return;  // leave the server fallback in place
    el.textContent = _localFormat(d, el.getAttribute("data-fmt") || "datetime");
    el.setAttribute("title", d.toString());
});

// Shift+click range select for any group of checkboxes that share a
// `name` attribute and have 2+ members. Standard UI idiom — clicking
// one checkbox, then shift-clicking another, propagates the second
// click's NEW state to every checkbox between them in DOM order.
// Auto-binds page-wide so list pages get it for free; pages with a
// lone toggle (mark_as_printed, etc.) are unaffected because their
// group has length 1.
(function () {
    const groups = {};
    document.querySelectorAll('input[type=checkbox][name]').forEach(function (cb) {
        (groups[cb.name] = groups[cb.name] || []).push(cb);
    });
    Object.values(groups).forEach(function (cbs) {
        if (cbs.length < 2) return;
        let anchor = null;
        cbs.forEach(function (cb, i) {
            cb.addEventListener("click", function (e) {
                if (e.shiftKey && anchor && anchor !== cb) {
                    const a = cbs.indexOf(anchor);
                    const [from, to] = a < i ? [a, i] : [i, a];
                    const newState = cb.checked;  // already toggled by the click
                    for (let j = from; j <= to; j++) cbs[j].checked = newState;
                }
                anchor = cb;
            });
        });
    });
})();
{% if user is defined and user and not user.timezone %}
// Auto-capture browser timezone the first time a logged-in user with no
// stored timezone loads any page. Used only for out-of-band rendering
// (emails). The web UI already localizes via the <time> JS above.
(function () {
    try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (!tz) return;
        const body = "tz=" + encodeURIComponent(tz);
        fetch("/auth/timezone-init", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: body,
            credentials: "same-origin",
        }).catch(function () { /* best-effort; user can set it manually */ });
    } catch (_) { /* no Intl support; user can set it manually */ }
})();
{% endif %}
</script>
</body>
</html>
