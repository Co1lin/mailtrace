<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Avery 8163 label</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; }
@font-face {
    font-family: 'USPSIMBStandard';
    src: url({{ imb_font_data_uri }}) format('truetype');
    font-weight: normal;
    font-style: normal;
}
.page {
    width: 8.5in;
    height: 11in;
    padding: 0.5in 0;
    page-break-after: always;
    position: relative;
}
.label {
    width: 4in;
    height: 2in;
    position: absolute;
    padding: 0.1in;
}
.usps-barcode { font-family: "USPSIMBStandard"; font-size: 16pt; margin-bottom: 0.1in; }
.barcode-humanreadable { font-size: 10pt; }
.recipient-text { font-family: "DejaVu Serif", serif; white-space: pre-line; }
</style>
</head>
<body>
    <div class="page">
        <div class="label" style="top: {{ (row - 1) * 2 + 0.5 }}in; left: {{ (col - 1) * 4.25 + 0.2 }}in;">
            <div class="usps-barcode">{{ barcode }}</div>
            <div class="barcode-humanreadable">{{ human_readable_bar }}</div>
            <div class="recipient-text">{{ recipient_address }}</div>
        </div>
    </div>
</body>
</html>
