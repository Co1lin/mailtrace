services:
  mailtrace:
    # Default: pull the published image. To build locally instead, run
    # `MAILTRACE_IMAGE= docker compose up --build` (empty string disables
    # the registry pull and falls through to the build context below).
    image: ${MAILTRACE_IMAGE:-ghcr.io/co1lin/mailtrace:latest}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: ${MAILTRACE_PULL_POLICY:-missing}
    restart: unless-stopped
    depends_on:
      mailtrace-redis:
        condition: service_healthy
    environment:
      # === Bootstrap (must be set before the app can start) ===
      # The session secret is the only truly required env var.
      MAILTRACE_SESSION_SECRET: ${MAILTRACE_SESSION_SECRET:?set MAILTRACE_SESSION_SECRET in .env}
      # Bind / where to find the data backends.
      MAILTRACE_REDIS_URL: redis://mailtrace-redis:6379/0
      MAILTRACE_HOST: 0.0.0.0
      MAILTRACE_PORT: 8080
      MAILTRACE_WORKERS: ${MAILTRACE_WORKERS:-2}
      MAILTRACE_ROOT_PATH: ${MAILTRACE_ROOT_PATH:-}
      # Where the IV-MTR push receiver archives raw POSTed JSON for replay.
      MAILTRACE_INGEST_ARCHIVE_DIR: ${MAILTRACE_INGEST_ARCHIVE_DIR:-/data/ingest_raw}
      # Reverse-proxy IPs whose X-Forwarded-For we trust (logging only;
      # auth on /usps_feed is HTTP Basic Auth, set in /admin/ingest).
      MAILTRACE_TRUSTED_PROXIES: ${MAILTRACE_TRUSTED_PROXIES:-["127.0.0.1","::1"]}
      MAILTRACE_TIMEZONE: ${MAILTRACE_TIMEZONE:-UTC}
      TZ: ${MAILTRACE_TIMEZONE:-UTC}
      # USPS API credentials are PER-USER, configured at /auth/account by
      # each user — not in env. Platform admins manage SMTP / push-feed /
      # poll cadence at /admin/email, /admin/ingest, /admin/settings.
    volumes:
      - mailtrace-data:/data
    ports:
      - "${MAILTRACE_BIND:-127.0.0.1:8084}:8080"

  mailtrace-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - mailtrace-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mailtrace-data:
  mailtrace-redis-data:
